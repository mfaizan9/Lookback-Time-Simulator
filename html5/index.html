<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lookback Time Simulator</title>

  <!-- KL-UNL shared foundation (copied in unchanged) -->
  <link href="foundation/kl-unl.css" type="text/css" rel="stylesheet" media="all">
  <!-- Sim-specific styles only -->
  <link href="styles/styles.css" type="text/css" rel="stylesheet" media="all">
</head>
<body>
  <a class="sr-only sr-only-focusable" href="#controls-heading">Skip to controls</a>

  <div class="app-shell">

    <!-- Title bar + Reset / Help / About come from the shared masthead component. -->
    <kl-unl-masthead sim-id="lookbacktimesim" json-url="foundation/contents.json"></kl-unl-masthead>

    <main class="app-layout sim-layout">

      <!-- ============================================================= -->
      <!-- Display panel: the star, the observer, and the expanding light -->
      <!-- ============================================================= -->
      <section class="panel sim-panel" aria-labelledby="display-heading">
        <h2 id="display-heading" class="panel__heading">Star and Observer</h2>

        <div class="sim-panel__body">
          <div class="panel__canvas-wrap sim-canvas-wrap">
            <canvas id="display-canvas" class="sim-canvas" width="604" height="240"
                    role="img" aria-label="Star and observer display"
                    aria-describedby="display-desc"></canvas>
            <!-- Overlay for the distance label (real HTML/MathJax so it zooms and
                 exposes the MathJax menu); positioned under the brace in JS. -->
            <div id="display-overlay" class="sim-display__overlay" aria-hidden="true">
              <span id="dist-brace-label" class="sim-dist-label"></span>
            </div>
          </div>
        </div>

        <!-- Text equivalent of the canvas (read when the screen reader reaches the
             canvas via aria-describedby; the single live region is #sr-status). -->
        <p id="display-desc" class="sr-only"></p>
      </section>

      <!-- ============================================================= -->
      <!-- Timeline + Controls panel                                     -->
      <!-- ============================================================= -->
      <section class="panel sim-panel" aria-labelledby="controls-heading">
        <h2 id="controls-heading" class="panel__heading">Timeline and Controls</h2>

        <div class="sim-panel__body">

          <!-- Timeline: canvas draws the axis, cursor and markers; the numeric tick
               labels live in an HTML overlay so they are MathJax-typeset and zoom. -->
          <div class="sim-timeline">
            <div class="panel__canvas-wrap sim-canvas-wrap">
              <canvas id="timeline-canvas" class="sim-canvas" width="600" height="120"
                      role="img" aria-label="Timeline of years"
                      aria-describedby="timeline-desc"></canvas>
              <!-- Overlay layer (year ticks + moving labels), positioned in JS. -->
              <div id="timeline-overlay" class="sim-timeline__overlay" aria-hidden="true"></div>
            </div>
            <p id="timeline-desc" class="sr-only"></p>
          </div>

          <div class="sim-controls">

            <!-- ---- Supernova / timeline-year controls ---- -->
            <fieldset class="control-fieldset sim-fieldset">
              <legend class="control-fieldset__legend">Supernova</legend>

              <div class="control-row sim-row">
                <label class="control-row__label" for="sn-year-input">supernova occurs:</label>
                <input class="control-row__input sim-year-input" type="text"
                       id="sn-year-input" inputmode="text" autocomplete="off"
                       aria-describedby="sn-year-hint" value="1200 AD">
                <span id="sn-year-hint" class="sr-only">Type a year such as 1200 AD or 500 BC, then press Enter.</span>
              </div>

              <div class="control-row sim-row sim-row--slider">
                <label class="control-row__label" for="year-range" id="year-range-label">timeline year (cursor):</label>
                <!-- aria-valuetext (set in JS) speaks the year + era, e.g. "1200 AD"
                     / "8000 BC", instead of the raw signed number. -->
                <input class="control-row__slider sim-slider" type="range" id="year-range"
                       min="-7999" max="10000" step="1" value="1200"
                       aria-valuetext="1200 AD">
                <!-- MathJax value is visual only; the spoken value is on the slider. -->
                <output class="sim-value" id="year-range-value" for="year-range" aria-hidden="true"></output>
              </div>

              <div class="sim-row--observed">
                <span class="control-row__label" id="observed-label-text">is observed:</span>
                <output class="sim-value sim-value--boxed" id="observed-output" for="year-range" aria-hidden="true"></output>
                <!-- Spoken equivalent of the boxed value, e.g. "4200 AD". -->
                <span class="sr-only" id="observed-sr"></span>
              </div>
            </fieldset>

            <!-- ---- Observer distance control ---- -->
            <fieldset class="control-fieldset sim-fieldset">
              <legend class="control-fieldset__legend">Observer</legend>

              <div class="control-row sim-row sim-row--slider sim-row--align-slider">
                <label class="control-row__label" for="dist-range">distance:</label>
                <!-- aria-valuetext (set in JS) speaks e.g. "3000 light years". -->
                <input class="control-row__slider sim-slider" type="range" id="dist-range"
                       min="1000" max="10000" step="100" value="3000"
                       aria-valuetext="3000 light years">
                <output class="sim-value" id="dist-value" for="dist-range" aria-hidden="true"></output>
              </div>
            </fieldset>

            <!-- ---- Run controls ---- -->
            <div class="button-row sim-button-row">
              <button type="button" class="button sim-button" id="start-reset-button">go supernova</button>
              <button type="button" class="button sim-button" id="pause-resume-button" disabled>...</button>
            </div>

          </div><!-- /sim-controls -->
        </div>
      </section>

      <!-- Polite announcements of committed state changes. -->
      <p id="sr-status" class="sr-only" aria-live="polite"></p>

    </main>
  </div>

  <!-- Foundation equation helper (copied in unchanged) -->
  <script src="foundation/kl-unl.js"></script>
  <!-- Shared masthead custom element (copied in unchanged) -->
  <script src="foundation/kl-unl-masthead.js"></script>

  <!-- MathJax (vendored locally; SVG output is self-contained, no CDN). -->
  <script>
    window.MathJax = {
      loader: { failed: function (err) { console.warn('[MathJax] optional component not vendored:', err.message); } },
      tex: { inlineMath: [['\\(', '\\)'], ['$', '$']] },
      svg: { fontCache: 'none' },
      options: { enableMenu: true, menuOptions: { settings: { assistiveMml: false } } }
    };
  </script>
  <script src="assets/mathjax/tex-mml-svg.js"></script>

  <!-- Sim logic -->
  <script src="simulation.js"></script>
</body>
</html>
